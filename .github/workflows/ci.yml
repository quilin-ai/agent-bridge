name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # AgentBridge's PRIMARY real runtime is macOS (default state dir is
  # ~/Library/Application Support/AgentBridge — see CLAUDE.md). Platform-sensitive
  # surfaces — state-dir resolution, `ps`-output column matching, SIGTERM/SIGKILL
  # process-group semantics, and Bun.serve socket behavior (prior permessage-deflate
  # platform bug) — were previously validated ONLY on ubuntu, a platform no
  # maintainer runs. This matrix runs the IDENTICAL full gate on both OSes so macOS
  # regressions are caught in CI, not by accident on a dev machine.
  #
  # Cost/coverage trade-off: macOS runners bill ~10x ubuntu minutes, but the full
  # suite is ~60s (743 tests + trivial smokes), so running the whole gate on every
  # PR + push is cheap enough to justify against the alternative of macOS bugs
  # escaping CI entirely. Both legs run the same steps/commands; only `runs-on`
  # differs. `fail-fast: false` so a macOS-only failure doesn't mask the ubuntu
  # result (and vice versa).
  check:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run full check
        run: bun run check

      - name: Release smoke (built CLI artifacts)
        run: bun run smoke:built

      - name: Release smoke (npm pack completeness)
        run: bun run smoke:pack

  # Windows is not a fully supported platform yet, but the pre-flight port
  # cleanup (issue #76) has a dedicated win32 path that no maintainer can
  # exercise locally — this job runs its unit tests plus a LIVE check of the
  # real PowerShell commands (Get-NetTCPConnection / Win32_Process) against
  # an actual listener on the runner.
  windows-port-cleanup:
    runs-on: windows-latest
    # Advisory while the platform job proves itself stable (per the repo's own
    # audit guidance on new platform jobs); flip to a hard gate after a streak
    # of green runs.
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Port-cleanup unit + live platform tests
        run: bun test src/unit-test/port-cleanup.test.ts src/unit-test/port-cleanup-live.test.ts
